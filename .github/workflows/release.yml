name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  BINARY: leolock

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            archive: tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NAME=${{ env.BINARY }}-$VERSION-${{ matrix.target }}

          mkdir dist

          BIN=${{ env.BINARY }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN="$BIN.exe"
          fi

          cp target/${{ matrix.target }}/release/$BIN dist/

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            powershell Compress-Archive -Path dist/$BIN -DestinationPath $NAME.zip
          else
            tar -czf $NAME.tar.gz -C dist $BIN
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  linux-packages:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install packagers
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build binary
        run: cargo build --release

      - name: Build deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cargo deb --no-build \
            --output target/${{ env.BINARY }}_${VERSION}_amd64.deb

      - name: Build rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cargo generate-rpm \
            --output target/${{ env.BINARY }}-${VERSION}.x86_64.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/*.deb
            target/*.rpm

  release:
    runs-on: ubuntu-22.04
    needs:
      - build
      - linux-packages

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          mkdir release
          find artifacts -type f -exec mv {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*
