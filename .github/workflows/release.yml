# 源码发布工作流
# 主要发布源码包和通用二进制文件
# .deb 和 .rpm 包由单独的 build-packages.yml 工作流处理

name: Source Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # 预发布版本
  workflow_dispatch:

jobs:
  build-source:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG_NAME, Version: $VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release
          # 测试二进制文件
          ./target/release/leolock --version || echo "无法获取版本信息"

      - name: Check required files
        run: |
          echo "=== 检查必需文件 ==="
          ls -la target/release/leolock
          ls -la LICENSE
          ls -la README.md
          ls -la README-en.md
          echo "=== 所有文件检查完成 ==="

      - name: Create source archive
        run: |
          # 使用 git archive 创建干净的源码包
          git archive --format=tar.gz --prefix=leolock-${{ steps.get_version.outputs.version }}/ \
            -o leolock-${{ steps.get_version.outputs.version }}.tar.gz HEAD
          
          # 创建包含构建产物的压缩包
          echo "=== 创建二进制包 ==="
          tar -czvf leolock-${{ steps.get_version.outputs.version }}-x86_64-linux-gnu.tar.gz \
            target/release/leolock \
            LICENSE \
            README.md \
            README-en.md
          
          echo "=== 文件列表 ==="
          tar -tzf leolock-${{ steps.get_version.outputs.version }}-x86_64-linux-gnu.tar.gz
          
          # 计算校验和
          sha256sum leolock-*.tar.gz > SHA256SUMS
          echo "=== 校验和 ==="
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.tag_name }}
          body: |
            ## LeoLock ${{ steps.get_version.outputs.version }}
            
            ### 源码包
            - `leolock-${{ steps.get_version.outputs.version }}.tar.gz` - 完整的源代码
            
            ### 预编译二进制
            - `leolock-${{ steps.get_version.outputs.version }}-x86_64-linux-gnu.tar.gz` - Linux x86_64 二进制文件
            
            ### 包管理器安装
            **.deb 和 .rpm 包** 由单独的构建工作流生成，请查看其他 assets。
            
            ### 从源码安装
            ```bash
            # 下载源码
            tar -xzf leolock-${{ steps.get_version.outputs.version }}.tar.gz
            cd leolock-${{ steps.get_version.outputs.version }}
            
            # 构建
            cargo build --release
            
            # 安装
            sudo cp target/release/leolock /usr/local/bin/
            ```
            
            ### 直接使用二进制
            ```bash
            tar -xzf leolock-${{ steps.get_version.outputs.version }}-x86_64-linux-gnu.tar.gz
            chmod +x leolock
            ./leolock --help
            ```
            
            ### 校验和
            ```bash
            sha256sum -c SHA256SUMS
            ```
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.tag_name, '-') }}
          files: |
            leolock-${{ steps.get_version.outputs.version }}.tar.gz
            leolock-${{ steps.get_version.outputs.version }}-x86_64-linux-gnu.tar.gz
            SHA256SUMS
          token: ${{ secrets.GITHUB_TOKEN }}
