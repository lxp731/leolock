name: Build Packages (.deb & .rpm)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build-deb-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libudev-dev \
            libsystemd-dev \
            debhelper \
            dh-cargo \
            cargo-deb \
            rpm

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build project
        run: |
          cargo build --release --target ${{ matrix.target }}
          # 测试二进制文件
          ./target/${{ matrix.target }}/release/leolock --version || true

      - name: Build .deb package
        run: |
          cargo deb --target ${{ matrix.target }} --no-build
          echo "=== .deb 包信息 ==="
          ls -la target/debian/
          dpkg-deb -I target/debian/leolock_*.deb || true

      - name: Build .rpm package
        run: |
          cargo generate-rpm --target ${{ matrix.target }}
          echo "=== .rpm 包信息 ==="
          ls -la target/generate-rpm/
          rpm -qpi target/generate-rpm/leolock-*.rpm || true

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          # 复制 .deb 文件
          cp target/debian/leolock_*.deb artifacts/${{ matrix.target }}/ 2>/dev/null || true
          # 复制 .rpm 文件
          cp target/generate-rpm/leolock-*.rpm artifacts/${{ matrix.target }}/ 2>/dev/null || true
          # 复制二进制文件
          cp target/${{ matrix.target }}/release/leolock artifacts/${{ matrix.target }}/leolock-${{ matrix.target }} 2>/dev/null || true
          
          echo "=== 生成的 artifacts ==="
          find artifacts -type f

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: artifacts/${{ matrix.target }}/
          retention-days: 7

  create-release:
    needs: build-deb-rpm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # 收集所有文件
          find dist-artifacts -type f -name "*.deb" -exec cp {} release-assets/ \;
          find dist-artifacts -type f -name "*.rpm" -exec cp {} release-assets/ \;
          find dist-artifacts -type f -name "leolock-*" ! -name "*.deb" ! -name "*.rpm" -exec cp {} release-assets/ \;
          
          # 创建 SHA256 校验和文件
          cd release-assets
          sha256sum * > SHA256SUMS
          cd ..
          
          echo "=== 发布文件列表 ==="
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## LeoLock ${{ github.ref_name }}
            
            ### 下载
            - **.deb 包**: Debian/Ubuntu 系统
            - **.rpm 包**: Fedora/RHEL/CentOS 系统
            - **二进制文件**: 直接运行
            
            ### 安装方法
            
            #### Debian/Ubuntu (.deb)
            ```bash
            sudo dpkg -i leolock_*.deb
            # 如果依赖问题
            sudo apt --fix-broken install
            ```
            
            #### Fedora/RHEL/CentOS (.rpm)
            ```bash
            sudo rpm -i leolock-*.rpm
            # 或使用 dnf
            sudo dnf install ./leolock-*.rpm
            ```
            
            #### 直接使用二进制
            ```bash
            chmod +x leolock-*
            ./leolock-* --help
            ```
            
            ### 校验和
            请验证下载文件的 SHA256 校验和：
            ```bash
            sha256sum -c SHA256SUMS
            ```
            
            ### 从源码构建
            ```bash
            cargo install --path .
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/leolock-*
            release-assets/SHA256SUMS
          token: ${{ secrets.GITHUB_TOKEN }}

  # 可选：测试安装包
  test-packages:
    needs: build-deb-rpm
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package_type: [deb, rpm]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-packages

      - name: Test .deb package (Ubuntu)
        if: matrix.package_type == 'deb'
        run: |
          # 查找 .deb 文件
          DEB_FILE=$(find test-packages -name "*.deb" | head -1)
          if [ -f "$DEB_FILE" ]; then
            echo "测试安装 .deb 包: $DEB_FILE"
            # 模拟安装（不实际安装）
            dpkg-deb -I "$DEB_FILE"
            dpkg-deb -c "$DEB_FILE"
          else
            echo "未找到 .deb 文件"
          fi

      - name: Test .rpm package (Fedora)
        if: matrix.package_type == 'rpm'
        run: |
          # 查找 .rpm 文件
          RPM_FILE=$(find test-packages -name "*.rpm" | head -1)
          if [ -f "$RPM_FILE" ]; then
            echo "测试 .rpm 包: $RPM_FILE"
            # 检查包信息
            rpm -qpi "$RPM_FILE" || true
            rpm -qpl "$RPM_FILE" || true
          else
            echo "未找到 .rpm 文件"
          fi