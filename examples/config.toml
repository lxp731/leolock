# LeoLock 配置文件
# 保存为 ~/.config/leolock/config.toml 或 .leolock.toml

# 危险路径列表（禁止处理的系统目录）
forbidden_paths = [
    "/bin",
    "/sbin", 
    "/usr/bin",
    "/usr/sbin",
    "/lib",
    "/lib64",
    "/usr/lib",
    "/usr/lib64",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/run",
    "/etc",
    "/root",
    "/var",
    "/tmp",
    # 可以根据需要添加更多路径
    # "/home/user/important",
    # "/mnt/backup",
]

# 最大文件大小（字节），0表示无限制
max_file_size = 10737418240  # 10GB

# 是否启用进度显示
show_progress = true

# 默认加密文件后缀
default_extension = ".leo"

# 密钥文件位置（支持 ~ 扩展）
key_file_path = "~/.config/leolock/keys.toml"

# 可选：自定义危险路径（通过环境变量覆盖）
# 设置环境变量：export LEOLOCK_FORBIDDEN_PATHS="/custom/path1,/custom/path2"
# 设置环境变量：export LEOLOCK_MAX_FILE_SIZE=5368709120  # 5GB